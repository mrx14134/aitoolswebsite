<!DOCTYPE html>
<html>
<head>

<title>AI Tools Hub</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

.tool{
display:block;
margin:10px auto;
padding:12px;
background:#28a745;
color:white;
text-decoration:none;
border-radius:6px;
width:260px;
}

</style>

</head>

<body>

<h1>AI Tools Hub</h1>

<div id="tools"></div>

<script>

const username = "mrx14134";
const repo = "aitoolswebsite";

fetch(`https://api.github.com/repos/${username}/${repo}/contents/docs`)
.then(res=>res.json())
.then(data=>{

data.forEach(file=>{

if(file.name.endsWith(".html") && file.name!="index.html"){

let name=file.name
.replace(".html","")
.replace(/-/g," ");

let link="https://mrx14134.github.io/aitoolswebsite/"+file.name;

document.getElementById("tools").innerHTML+=
`<a class="tool" href="${link}">${name}</a>`;

}

})

})

</script>

</body>
</html>
