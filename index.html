<!DOCTYPE html>
<html>

<head>

<title>AI Tools Hub</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

h1{
margin-top:20px;
}

#search{
padding:10px;
width:80%;
max-width:400px;
margin:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.tool{
background:white;
padding:15px;
border-radius:8px;
text-decoration:none;
color:black;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.tool:hover{
background:#28a745;
color:white;
}

footer{
margin-top:40px;
padding:20px;
background:#222;
color:white;
}

footer a{
color:white;
margin:0 10px;
text-decoration:none;
}

</style>

</head>

<body>

<h1>AI Tools Hub</h1>

<input id="search" placeholder="Search tools..." onkeyup="searchTools()">

<div class="grid" id="tools"></div>

<script>

const username="mrx14134";
const repo="aitoolswebsite";

fetch(`https://api.github.com/repos/${username}/${repo}/contents`)
.then(res=>res.json())
.then(data=>{

data.forEach(file=>{

if(file.name.endsWith(".html") && file.name!="index.html"){

let name=file.name
.replace(".html","")
.replace(/-/g," ");

let link=file.name;

document.getElementById("tools").innerHTML+=
`<a class="tool" href="${link}">${name}</a>`;

}

})

})

function searchTools(){

let input=document.getElementById("search").value.toLowerCase();

let tools=document.getElementsByClassName("tool");

for(let i=0;i<tools.length;i++){

let text=tools[i].innerText.toLowerCase();

tools[i].style.display=text.includes(input)?"block":"none";

}

}

</script>

<footer>

<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="Privacy.html">Privacy Policy</a>
<a href="Terms.html">Terms</a>

</footer>

</body>
</html>
